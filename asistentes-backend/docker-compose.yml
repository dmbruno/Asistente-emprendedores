services:
  flask:
    build: .
    container_name: asistentes-flask
    restart: unless-stopped
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      - baileys
    networks:
      - asistentes

  baileys:
    build: ./baileys_service
    container_name: asistentes-baileys
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    networks:
      - asistentes

  nginx:
    image: nginx:1.27-alpine
    container_name: asistentes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - flask
    networks:
      - asistentes
    profiles:
      - prod

networks:
  asistentes:
    driver: bridge
